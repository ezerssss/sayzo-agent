name: Build Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Windows
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build setup webui
        # The setup GUI is a Vite + React bundle loaded by pywebview. Built
        # fresh in CI (not committed) so the frozen binary always ships the
        # latest dist/. The PyInstaller spec picks it up as a data entry.
        working-directory: sayzo_agent/gui/webui
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        shell: bash
        run: |
          pip install llama-cpp-python \
            --only-binary=llama-cpp-python \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
          pip install webrtcvad-wheels librosa
          pip install resemblyzer --no-deps
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sayzo-agent.spec

      - name: Install NSIS
        run: choco install nsis -y

      - name: Download Visual C++ Redistributable
        # Bundled into the installer so target machines get a matched set of
        # msvcp140/vcruntime140 DLLs installed system-wide. We strip those
        # DLLs from the PyInstaller bundle in sayzo-agent.spec because mixing
        # versions across numpy/sklearn/pythonnet blows up torch's DllMain.
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "installer\windows\VC_redist.x64.exe"

      - name: Build NSIS installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis installer\windows\sayzo-agent.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/sayzo-agent-setup.exe

  # -----------------------------------------------------------------------
  # macOS
  # -----------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build setup webui
        working-directory: sayzo_agent/gui/webui
        run: |
          npm ci
          npm run build

      - name: Compile audio-tap Swift binary
        run: |
          cd sayzo_agent/capture/audio-tap
          swiftc -O -o audio-tap main.swift \
            -framework CoreAudio \
            -framework AudioToolbox \
            -framework AVFoundation

      - name: Generate logo.icns from logo.png
        run: |
          cd installer/assets
          mkdir -p logo.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size logo.png --out "logo.iconset/icon_${size}x${size}.png"
            double=$((size * 2))
            sips -z $double $double logo.png --out "logo.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns logo.iconset -o logo.icns
          rm -rf logo.iconset

      - name: Install dependencies
        run: |
          pip install llama-cpp-python \
            --only-binary=llama-cpp-python \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
          pip install webrtcvad-wheels librosa
          pip install resemblyzer --no-deps
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sayzo-agent.spec

      - name: Sign app bundle
        if: env.APPLE_DEVELOPER_ID != ''
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign --deep --force --options runtime \
            --sign "$APPLE_DEVELOPER_ID" \
            "dist/Sayzo Agent.app"

      - name: Create DMG
        run: |
          rm -f "dist/Sayzo-Agent.dmg"
          hdiutil create -volname "Sayzo Agent" \
            -srcfolder "dist/Sayzo Agent.app" \
            -ov -format UDZO \
            "dist/Sayzo-Agent.dmg" || \
          (sleep 2 && hdiutil create -volname "Sayzo Agent" \
            -srcfolder "dist/Sayzo Agent.app" \
            -ov -format UDZO \
            "dist/Sayzo-Agent.dmg")

      - name: Sign DMG
        if: env.APPLE_DEVELOPER_ID != ''
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign --sign "$APPLE_DEVELOPER_ID" dist/Sayzo-Agent.dmg

      - name: Notarize
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit dist/Sayzo-Agent.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple dist/Sayzo-Agent.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: dist/Sayzo-Agent.dmg

  # -----------------------------------------------------------------------
  # Deploy to droplet — waits for both builds, then scp's binaries + scripts.
  # The install scripts (install.ps1, install.sh) live in the repo and are
  # uploaded alongside the binaries so every main-push ships both together.
  # -----------------------------------------------------------------------
  deploy:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: artifacts/macos

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy to droplet
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key \
            artifacts/windows/sayzo-agent-setup.exe \
            installer/install.ps1 \
            root@"$HOST":/var/www/sayzo/releases/windows/

          scp -i ~/.ssh/deploy_key \
            artifacts/macos/Sayzo-Agent.dmg \
            installer/install.sh \
            root@"$HOST":/var/www/sayzo/releases/macos/
