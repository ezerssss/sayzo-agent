name: Build Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Windows
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build setup webui
        # The setup GUI is a Vite + React bundle loaded by pywebview. Built
        # fresh in CI (not committed) so the frozen binary always ships the
        # latest dist/. The PyInstaller spec picks it up as a data entry.
        working-directory: sayzo_agent/gui/webui
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        shell: bash
        run: |
          pip install webrtcvad-wheels librosa
          pip install resemblyzer --no-deps
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sayzo-agent.spec

      - name: Install NSIS
        run: choco install nsis -y

      - name: Download Visual C++ Redistributable
        # Bundled into the installer so target machines get a matched set of
        # msvcp140/vcruntime140 DLLs installed system-wide. We strip those
        # DLLs from the PyInstaller bundle in sayzo-agent.spec because mixing
        # versions across numpy/sklearn/pythonnet blows up torch's DllMain.
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "installer\windows\VC_redist.x64.exe"

      - name: Build NSIS installer
        # Pass the version from pyproject.toml (single source of truth for
        # Phase A auto-update) into the NSIS script via /DPRODUCT_VERSION so
        # Add/Remove Programs, the uninstall registry entry, and latest.json
        # all agree. The NSIS script has a !ifndef fallback for dev builds.
        run: |
          $VERSION = python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          Write-Host "Building NSIS installer for version $VERSION"
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis "/DPRODUCT_VERSION=$VERSION" installer\windows\sayzo-agent.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/sayzo-setup.exe

  # -----------------------------------------------------------------------
  # macOS
  # -----------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build setup webui
        working-directory: sayzo_agent/gui/webui
        run: |
          npm ci
          npm run build

      - name: Compile audio-tap Swift binary
        run: |
          cd sayzo_agent/capture/audio-tap
          swiftc -O -o audio-tap main.swift \
            -framework CoreAudio \
            -framework AudioToolbox \
            -framework AVFoundation

      - name: Compile audio-detect Swift binary
        # Sister helper to audio-tap. Reads kAudioHardwarePropertyProcessObjectList
        # + the responsibility SPI to give the agent per-process mic
        # attribution on macOS — pure read-only, no permissions needed.
        # (See sayzo_agent/arm/audio-detect/main.swift for full rationale.)
        run: |
          cd sayzo_agent/arm/audio-detect
          swiftc -O -o audio-detect main.swift \
            -framework CoreAudio \
            -framework Foundation

      - name: Generate logo.icns from logo.png
        run: |
          cd installer/assets
          mkdir -p logo.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size logo.png --out "logo.iconset/icon_${size}x${size}.png"
            double=$((size * 2))
            sips -z $double $double logo.png --out "logo.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns logo.iconset -o logo.icns
          rm -rf logo.iconset

      - name: Install dependencies
        run: |
          pip install webrtcvad-wheels librosa
          pip install resemblyzer --no-deps
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sayzo-agent.spec

      - name: Sign app bundle
        if: env.APPLE_DEVELOPER_ID != ''
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign --deep --force --options runtime \
            --sign "$APPLE_DEVELOPER_ID" \
            "dist/Sayzo.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          rm -f "dist/Sayzo.dmg"
          create-dmg \
            --volname "Sayzo" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Sayzo.app" 140 190 \
            --app-drop-link 400 190 \
            --hide-extension "Sayzo.app" \
            "dist/Sayzo.dmg" \
            "dist/Sayzo.app" || \
          (sleep 2 && rm -f "dist/Sayzo.dmg" && create-dmg \
            --volname "Sayzo" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Sayzo.app" 140 190 \
            --app-drop-link 400 190 \
            --hide-extension "Sayzo.app" \
            "dist/Sayzo.dmg" \
            "dist/Sayzo.app")

      - name: Sign DMG
        if: env.APPLE_DEVELOPER_ID != ''
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign --sign "$APPLE_DEVELOPER_ID" dist/Sayzo.dmg

      - name: Notarize
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit dist/Sayzo.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple dist/Sayzo.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: dist/Sayzo.dmg

  # -----------------------------------------------------------------------
  # Deploy Windows binary — runs as soon as the Windows build finishes.
  # Split out from the manifest job so a slow Windows build doesn't hold
  # up Mac users from getting the new Sayzo.dmg the moment it's ready
  # (Mac builds typically finish in ~5 min vs. Windows' ~25 min).
  # -----------------------------------------------------------------------
  deploy-windows:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy Windows installer
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key \
            artifacts/windows/sayzo-setup.exe \
            installer/install.ps1 \
            root@"$HOST":/var/www/sayzo/releases/windows/

  # -----------------------------------------------------------------------
  # Deploy macOS binary — runs as soon as the Mac build finishes.
  # -----------------------------------------------------------------------
  deploy-macos:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: artifacts/macos

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy macOS installer
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key \
            artifacts/macos/Sayzo.dmg \
            installer/install.sh \
            root@"$HOST":/var/www/sayzo/releases/macos/

  # -----------------------------------------------------------------------
  # Deploy auto-update manifest. Joins both platforms — we hold off
  # writing latest.json until the binaries it references are actually on
  # the droplet, otherwise the agent's update checker would send users
  # to a 404 (or worse, a stale binary with the wrong SHA256).
  #
  # latest.json is the file the running agent fetches on startup + every
  # 6h to decide whether to surface an "update available" toast. Hosted
  # at the releases root (not under windows/ or macos/) so both platforms
  # share one URL.
  # -----------------------------------------------------------------------
  deploy-manifest:
    needs: [deploy-windows, deploy-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: artifacts/macos

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Generate latest.json
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(python3 -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          WIN_SHA=$(sha256sum artifacts/windows/sayzo-setup.exe | cut -d' ' -f1)
          MAC_SHA=$(sha256sum artifacts/macos/Sayzo.dmg | cut -d' ' -f1)
          RELEASED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Sanitize notes for JSON embedding: first line only, strip quotes
          # and backslashes. Commit messages are untrusted input at this scale.
          NOTES=$(printf '%s' "${COMMIT_MESSAGE:-}" | head -n1 | tr -d '"\\')
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "released_at": "$RELEASED_AT",
            "notes": "$NOTES",
            "windows": {
              "url": "https://sayzo.app/releases/windows/sayzo-setup.exe",
              "sha256": "$WIN_SHA"
            },
            "macos": {
              "url": "https://sayzo.app/releases/macos/Sayzo.dmg",
              "sha256": "$MAC_SHA"
            }
          }
          EOF
          cat latest.json

      - name: Upload manifest
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key \
            latest.json \
            root@"$HOST":/var/www/sayzo/releases/latest.json
