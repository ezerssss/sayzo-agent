[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sayzo-agent"
version = "1.5.0"
description = "Armed-only capture agent for Sayzo — records meetings on user consent (hotkey or whitelisted meeting app) and feeds them to downstream English-coaching analysis."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.26",
    "scipy>=1.11",
    # noisereduce: spectral-gate denoise applied at session close (see dsp.py).
    # Pure numpy/scipy — pulls matplotlib transitively (used only by its
    # optional plotting helpers, which we never import).
    "noisereduce>=3.0",
    "sounddevice>=0.4.6",
    "PyAudioWPatch>=0.2.12; sys_platform == 'win32'",
    "silero-vad>=5.1",
    "faster-whisper>=1.0.3",
    # resemblyzer: install separately with --no-deps because it pins the
    # source-only `webrtcvad`. See README. Order:
    #   pip install webrtcvad-wheels librosa
    #   pip install resemblyzer --no-deps
    "webrtcvad-wheels>=2.0.14",
    "librosa>=0.10",
    # llama-cpp-python: install separately from the prebuilt wheel index, e.g.
    #   pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
    # Left out of `dependencies` so `pip install -e .` doesn't try to compile it.
    "av>=12.0",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "huggingface-hub>=0.24",
    "httpx>=0.27",
    "click>=8.1",
    "rich>=13.7",
    "pystray>=0.19",
    "Pillow>=10.0",
    "desktop-notifier>=6.2",
    "pywebview>=5.3,<6",
    # Armed-only capture model (v1.0+).
    # Global hotkey listener + process / window queries.
    "pynput>=1.7",
    "psutil>=5.9",
    # Windows: mic-holder detection via WASAPI audio sessions, foreground
    # window via Win32.
    "pycaw>=20240210; sys_platform == 'win32'",
    "pywin32>=306; sys_platform == 'win32'",
    # Windows: active-browser-tab URL read via UIAutomation. Used by
    # platform_win.get_browser_tab_url / get_browser_window_urls so
    # user-added web meeting URLs (custom detectors) actually match
    # without needing hand-authored title regex fallbacks. Pure-Python
    # comtypes wrapper; comtypes itself is already pulled in by pycaw.
    "uiautomation>=2.0; sys_platform == 'win32'",
    # macOS: mic-active query via CoreAudio, frontmost app via NSWorkspace.
    "pyobjc-framework-Cocoa>=10.0; sys_platform == 'darwin'",
    "pyobjc-framework-CoreAudio>=10.0; sys_platform == 'darwin'",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
sayzo-agent = "sayzo_agent.__main__:cli"

[tool.setuptools.packages.find]
include = ["sayzo_agent*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
